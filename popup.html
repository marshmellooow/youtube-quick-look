<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>YouTube Quick Look</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 280px;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    .wrap {
      padding: 16px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 14px 0;
      letter-spacing: 0.2px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .row:first-of-type { border-top: 0; }
    .label {
      color: #ddd;
    }
    .sub {
      color: #888;
      font-size: 11px;
      margin-top: 2px;
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.15s ease;
      flex: 0 0 38px;
    }
    .toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.15s ease;
    }
    .toggle.on {
      background: #ff5f57;
    }
    .toggle.on::after {
      transform: translateX(16px);
    }

    /* Key picker */
    .key-btn {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      cursor: pointer;
      min-width: 80px;
      text-align: center;
    }
    .key-btn:hover {
      background: #2a2a2a;
    }
    .key-btn.listening {
      background: #ff5f57;
      color: #fff;
      border-color: #ff5f57;
    }

    .hint {
      color: #666;
      font-size: 11px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">YouTube Quick Look</h1>

    <div class="row">
      <div>
        <div class="label">Aktiviert</div>
        <div class="sub">Preview ein-/ausschalten</div>
      </div>
      <div id="toggle" class="toggle"></div>
    </div>

    <div class="row">
      <div>
        <div class="label">Auslöse-Taste</div>
        <div class="sub">Beim Hover über einen Link</div>
      </div>
      <button id="keyBtn" class="key-btn">Space</button>
    </div>

    <div class="hint">Nicht auf youtube.com selbst — Esc bricht ab</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
