<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">YouTube Quick Look logo</title>
  <desc id="desc">A dark rounded app icon with a coral play preview window and cyan quick-look lens.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202124"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="accent" x1="34" y1="35" x2="91" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff766d"/>
      <stop offset="1" stop-color="#e9433d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#bg)"/>
  <rect x="26" y="34" width="66" height="50" rx="14" fill="url(#accent)" filter="url(#shadow)"/>
  <path d="M55 49.5v19l17-9.5-17-9.5Z" fill="#ffffff"/>
  <circle cx="82" cy="77" r="18" fill="none" stroke="#66e8ff" stroke-width="8"/>
  <path d="M94.5 89.5 107 102" fill="none" stroke="#66e8ff" stroke-width="8" stroke-linecap="round"/>
  <path d="M38 42h42" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
</svg>
